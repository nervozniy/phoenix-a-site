<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phoenix A — Красное смещение</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(180deg,#03050b,#0b1222);
  color:white;
}

.wrap{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.glass{
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(18px);
  border-radius:24px;
  border:1px solid rgba(255,255,255,0.1);
  padding:20px;
}

h1{
  font-size:48px;
  margin:0 0 10px;
}

h2{margin-top:0}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

canvas{
  width:100%;
  height:100%;
}

.scene{
  height:420px;
}

.slider{
  width:100%;
  margin-top:10px;
}

@media(max-width:900px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="wrap">

<div class="glass">
<h1>Гравитационное красное смещение</h1>
<p>Фотон при приближении к чёрной дыре краснеет и его траектория искривляется.</p>
</div>

<div class="grid">

<div class="glass">
<h2>Симуляция</h2>

<div class="scene">
<canvas id="sim"></canvas>
</div>

<input id="slider" class="slider" type="range" min="0" max="100" value="70">

</div>

<div class="glass">
<h2>График</h2>
<canvas id="graph" height="300"></canvas>
</div>

</div>

</div>

<script>
const sim = document.getElementById("sim");
const ctx = sim.getContext("2d");

const graph = document.getElementById("graph");
const gctx = graph.getContext("2d");

const slider = document.getElementById("slider");

function resize(){
  sim.width = sim.clientWidth;
  sim.height = sim.clientHeight;
}
resize();
window.addEventListener("resize",resize);

let t = slider.value/100;
let target = t;
let time=0;

function lerp(a,b,t){return a+(b-a)*t;}
function ease(x){return x*x*(3-2*x);}

function getZ(t){
  return 0.05 + Math.pow(t,2.2)*0.95;
}

function photonColor(t){
  let c=ease(t);
  let r=255;
  let g=230-c*180;
  let b=180-c*140;
  return rgb(${r},${g},${b});
}

function draw(){

  let w=sim.width;
  let h=sim.height;

  ctx.clearRect(0,0,w,h);

  let cx=w*0.65;
  let cy=h*0.55;

  // сетка
  ctx.strokeStyle="rgba(120,150,255,0.15)";

  for(let y=50;y<h;y+=30){
    ctx.beginPath();
    for(let x=0;x<w;x+=10){
      let dx=x-cx;
      let dy=y-cy;
      let d=Math.sqrt(dx*dx+dy*dy);

      let warp=(20000/(d+80))*(0.3+t);

      let ny=y - dy/d * warp*0.12;

      if(x===0) ctx.moveTo(x,ny);
      else ctx.lineTo(x,ny);
    }
    ctx.stroke();
  }

  // дыра
  ctx.beginPath();
  ctx.arc(cx,cy,50,0,Math.PI*2);
  ctx.fillStyle="black";
  ctx.shadowBlur=40;
  ctx.shadowColor="purple";
  ctx.fill();
  ctx.shadowBlur=0;

  // диск
  ctx.beginPath();
  ctx.ellipse(cx,cy,120,35,0,0,Math.PI*2);
  ctx.strokeStyle="orange";
  ctx.lineWidth=6;
  ctx.stroke();

  // фотон
  let px = lerp(80,cx-120,ease(t));
  let py = cy - (1-t)*60;

  // траектория
  ctx.beginPath();
  for(let x=60;x<px;x+=5){
    let k=(x-60)/(px-60);
    let bend=(1-t)*70*Math.pow(k,2);
    let y=cy + bend - 20;

    if(x===60) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  }
  ctx.strokeStyle=photonColor(t);
  ctx.lineWidth=3;
  ctx.stroke();

  // glow
  let g=ctx.createRadialGradient(px,py,2,px,py,40);
  g.addColorStop(0, photonColor(t));
  g.addColorStop(1,"transparent");

  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.arc(px,py,40,0,Math.PI*2);
  ctx.fill();

  // ядро
  ctx.beginPath();
  ctx.arc(px,py,6,0,Math.PI*2);
  ctx.fillStyle=photonColor(t);
  ctx.fill();

  // белый центр
  ctx.beginPath();
  ctx.arc(px,py,3,0,Math.PI*2);
  ctx.fillStyle="white";
  ctx.globalAlpha=0.8;
  ctx.fill();
  ctx.globalAlpha=1;
}

function drawGraph(){

  let w=graph.width;
  let h=graph.height;

  gctx.clearRect(0,0,w,h);

  gctx.beginPath();

  for(let i=0;i<=100;i++){
    let tt=i/100;
    let z=getZ(tt);

    let x=50+tt*(w-100);
    let y=h-40 - z*(h-80);

    if(i===0) gctx.moveTo(x,y);
    else gctx.lineTo(x,y);
  }

  gctx.strokeStyle="violet";
  gctx.lineWidth=3;
  gctx.stroke();
  let z=getZ(t);

  let px=50+t*(w-100);
  let py=h-40 - z*(h-80);

  gctx.beginPath();
  gctx.arc(px,py,6,0,Math.PI*2);
  gctx.fillStyle=photonColor(t);
  gctx.fill();
}

function loop(){
  target = slider.value/100;
  t = lerp(t,target,0.08);
  time+=0.016;

  draw();
  drawGraph();

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
