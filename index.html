<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phoenix A</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: linear-gradient(180deg, #05060a, #0f1424);
}

.wrap {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.glass {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(14px);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
}

h1 { font-size: 50px; margin: 0 0 10px; }
h2 { margin-top: 0; }

canvas {
  width: 100%;
  border-radius: 20px;
  background: rgba(0,0,0,0.2);
}

.slider {
  width: 100%;
  margin-top: 10px;
}

.stat {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}
</style>
</head>

<body>
<div class="wrap">

<div class="glass">
<h1>Чёрная дыра</h1>
<p>Двигай ползунок и смотри, как меняется фотон и график.</p>
</div>

<div class="glass">
<h2>Симуляция</h2>
<canvas id="sim" width="800" height="400"></canvas>
<input type="range" id="slider" class="slider" min="0" max="100" value="70">
</div>

<div class="glass">
<h2>График</h2>
<canvas id="graph" width="800" height="400"></canvas>

<div class="stat">
<span>z:</span>
<span id="z">0</span>
</div>

<div class="stat">
<span>λ:</span>
<span id="lambda">0</span>
</div>
</div>

</div>

<script>
const sim = document.getElementById("sim");
const graph = document.getElementById("graph");
const sctx = sim.getContext("2d");
const gctx = graph.getContext("2d");
const slider = document.getElementById("slider");

let t = slider.value / 100;

function getZ(t){
  return Math.pow(1 - t, 2);
}

function getLambda(z){
  return 500 + z * 500;
}

function drawSim(){
  const w = sim.width;
  const h = sim.height;
  const cx = w * 0.7;
  const cy = h / 2;

  sctx.clearRect(0,0,w,h);

  // черная дыра
  sctx.beginPath();
  sctx.arc(cx, cy, 40, 0, Math.PI*2);
  sctx.fillStyle = "black";
  sctx.shadowBlur = 30;
  sctx.shadowColor = "purple";
  sctx.fill();
  sctx.shadowBlur = 0;

  // кольцо
  sctx.beginPath();
  sctx.arc(cx, cy, 70, 0, Math.PI*2);
  sctx.strokeStyle = "orange";
  sctx.lineWidth = 8;
  sctx.stroke();

  // фотон
  const px = 50 + (cx - 100 - 50) * t;
  const py = cy;

  sctx.beginPath();
  sctx.arc(px, py, 6, 0, Math.PI*2);
  sctx.fillStyle = "yellow";
  sctx.fill();
}

function drawGraph(){
  const w = graph.width;
  const h = graph.height;

  gctx.clearRect(0,0,w,h);

  gctx.beginPath();

  for(let i=0;i<=100;i++){
    let x = i/100;
    let z = getZ(x);

    let px = 50 + x*(w-100);
    let py = h-50 - z*(h-100);

    if(i===0) gctx.moveTo(px,py);
    else gctx.lineTo(px,py);
  }

  gctx.strokeStyle = "violet";
  gctx.lineWidth = 3;
  gctx.stroke();

  // точка
  let z = getZ(t);
  let px = 50 + t*(w-100);
  let py = h-50 - z*(h-100);

  gctx.beginPath();
  gctx.arc(px,py,6,0,Math.PI*2);
  gctx.fillStyle="white";
  gctx.fill();
}

function update(){
  t += (slider.value/100 - t)*0.1;

  let z = getZ(t);
  let lambda = getLambda(z);

  document.getElementById("z").innerText = z.toFixed(2);
  document.getElementById("lambda").innerText = Math.round(lambda);

  drawSim();
  drawGraph();

  requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
