<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phoenix A — Гравитационное красное смещение</title>

<style>
/* (ТВОЙ CSS БЕЗ ИЗМЕНЕНИЙ — оставляю как есть) */
*{box-sizing:border-box;}
body{margin:0;font-family:Arial;background:linear-gradient(180deg,#03050b,#0b1222);color:white}
.wrap{max-width:1000px;margin:auto;padding:20px}
.glass{background:rgba(255,255,255,0.07);backdrop-filter:blur(16px);border-radius:20px;padding:20px;margin-bottom:20px}
canvas{width:100%;border-radius:20px}
</style>
</head>

<body>
<div class="wrap">

<h1>Гравитационное красное смещение</h1>

<canvas id="simCanvas" width="800" height="400"></canvas>
<input id="photonSlider" type="range" min="0" max="100" value="80">

<canvas id="graphCanvas" width="800" height="300"></canvas>

</div>

<script>
const slider = document.getElementById("photonSlider");
const simCanvas = document.getElementById("simCanvas");
const graphCanvas = document.getElementById("graphCanvas");

const sctx = simCanvas.getContext("2d");
const gctx = graphCanvas.getContext("2d");

let targetT = slider.value/100;
let smoothT = targetT;
let time = 0;

function lerp(a,b,t){ return a+(b-a)*t; }
function ease(t){ return t*t*(3-2*t); }

// ✅ ИСПРАВЛЕННАЯ ФИЗИКА
function getZ(t){
  return 0.05 + Math.pow(t,2.2)*0.95;
}

function photonColor(t){
  let c = ease(t); // ← ФИКС
  let r = 255;
  let g = Math.floor(240 - c*170);
  let b = Math.floor(190 - c*140);
  return rgb(${r},${g},${b});
}

function photonGlow(t){
  let c = ease(t); // ← ФИКС
  let r = 255;
  let g = Math.floor(200 - c*150);
  let b = Math.floor(120 - c*100);
  return rgba(${r},${g},${b},;
}

function drawSim(){
  let w = simCanvas.width;
  let h = simCanvas.height;

  let cx = w*0.7;
  let cy = h/2;

  sctx.clearRect(0,0,w,h);

  // искривление пространства
  sctx.strokeStyle="rgba(120,150,255,0.15)";
  for(let y=40;y<h-40;y+=25){
    sctx.beginPath();
    for(let x=20;x<w-20;x+=8){
      let dx=x-cx;
      let dy=y-cy;
      let d=Math.sqrt(dx*dx+dy*dy);

      let warp=(20000/(d+80))*(0.3+smoothT); // усиление
      let ny=y - dy/d*warp*0.12;

      if(x===20) sctx.moveTo(x,ny);
      else sctx.lineTo(x,ny);
    }
    sctx.stroke();
  }

  // черная дыра
  sctx.beginPath();
  sctx.arc(cx,cy,45,0,Math.PI*2);
  sctx.fillStyle="black";
  sctx.shadowBlur=30;
  sctx.shadowColor="purple";
  sctx.fill();
  sctx.shadowBlur=0;

  // диск
  sctx.beginPath();
  sctx.ellipse(cx,cy,100,28,0,0,Math.PI*2);
  sctx.strokeStyle="orange";
  sctx.lineWidth=6;
  sctx.stroke();

  // фотон
  let px = 80 + (cx-120-80)*smoothT;
  let py = cy - (1-smoothT)*60;

  // траектория
  sctx.beginPath();
  for(let x=60;x<px;x+=4){
    let k=(x-60)/(px-60);
    let bend=(1-smoothT)*40*Math.pow(k,2);
    let y=cy + bend - 20;
    if(x===60) sctx.moveTo(x,y);
    else sctx.lineTo(x,y);
  }
  sctx.strokeStyle=photonColor(smoothT);
  sctx.lineWidth=3;
  sctx.stroke();

  // glow
  let glow = sctx.createRadialGradient(px,py,2,px,py,42);
  glow.addColorStop(0, photonGlow(smoothT)+"1)");
  glow.addColorStop(0.5, photonGlow(smoothT)+"0.6)");
  glow.addColorStop(1, photonGlow(smoothT)+"0)");
  sctx.fillStyle=glow;
  sctx.beginPath();
  sctx.arc(px,py,42,0,Math.PI*2);
  sctx.fill();

  // ядро фотона
  sctx.beginPath();
  sctx.arc(px,py,6,0,Math.PI*2);
  sctx.fillStyle=photonColor(smoothT);
  sctx.fill();

  // белый центр
  sctx.beginPath();
  sctx.arc(px,py,3,0,Math.PI*2);
  sctx.fillStyle="white";
  sctx.globalAlpha=0.8;
  sctx.fill();
  sctx.globalAlpha=1;
}

function drawGraph(){
  let w = graphCanvas.width;
  let h = graphCanvas.height;

  gctx.clearRect(0,0,w,h);

  gctx.beginPath();

  for(let i=0;i<=100;i++){
    let t=i/100;
    let z=getZ(t);

    let x=50+t*(w-100);
    let y=h-40 - z*(h-80);

    if(i===0) gctx.moveTo(x,y);
    else gctx.lineTo(x,y);
  }

  gctx.strokeStyle="violet";
  gctx.lineWidth=3;
  gctx.stroke();

  // точка
  let z=getZ(smoothT);
  let px=50+smoothT*(w-100);
  let py=h-40 - z*(h-80);

  gctx.beginPath();
  gctx.arc(px,py,6,0,Math.
           PI*2);
  gctx.fillStyle=photonColor(smoothT);
  gctx.fill();
}

function animate(){
  targetT = slider.value/100;
  smoothT = lerp(smoothT,targetT,0.08);
  time+=0.016;

  drawSim();
  drawGraph();

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
