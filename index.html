<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Гравитационное красное смещение</title>

<style>
body{
  margin:0;
  font-family:-apple-system, Arial;
  background:linear-gradient(180deg,#020409,#0c1424);
  color:white;
}

.wrap{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.glass{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  backdrop-filter:blur(16px);
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
}

canvas{
  width:100%;
  border-radius:20px;
  background:rgba(0,0,0,0.3);
}

.slider{
  width:100%;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="wrap">

<div class="glass">
<h1>Гравитационное красное смещение</h1>
<p>
Когда свет покидает область сильной гравитации (например, около чёрной дыры),
он теряет энергию, а его длина волны увеличивается — поэтому он смещается в красную область спектра.
</p>
</div>

<div class="glass">
<h2>Интерактивная модель</h2>
<canvas id="sim" width="800" height="350"></canvas>
<input id="slider" class="slider" type="range" min="0" max="100" value="80">
</div>

<div class="glass">
<h2>График</h2>
<canvas id="graph" width="800" height="300"></canvas>
<p>z = Δλ / λ</p>
</div>

</div>

<script>
const sim = document.getElementById("sim");
const sctx = sim.getContext("2d");

const graph = document.getElementById("graph");
const gctx = graph.getContext("2d");

const slider = document.getElementById("slider");

let t = slider.value/100;

// цвет фотона
function photonColor(x){
  let k = 1-x;
  let r = 255;
  let g = 220 - k*180;
  let b = 160 - k*120;
  return rgb(${r},${g},${b});
}

// плавность
function lerp(a,b,k){ return a+(b-a)*k; }

// симуляция
function drawSim(){
  const w = sim.width;
  const h = sim.height;

  sctx.clearRect(0,0,w,h);

  let cx = w*0.7;
  let cy = h/2;

  // черная дыра
  sctx.beginPath();
  sctx.arc(cx,cy,40,0,Math.PI*2);
  sctx.fillStyle="black";
  sctx.shadowBlur=30;
  sctx.shadowColor="purple";
  sctx.fill();
  sctx.shadowBlur=0;

  // диск
  sctx.beginPath();
  sctx.ellipse(cx,cy,90,25,0,0,Math.PI*2);
  sctx.strokeStyle="orange";
  sctx.lineWidth=8;
  sctx.stroke();

  // фотон
  let px = 80 + (cx-120-80)*t;
  let py = cy - (1-t)*60;

  // траектория
  sctx.beginPath();
  for(let x=80;x<px;x+=4){
    let k = (x-80)/(px-80);
    let bend = (1-t)*40*Math.pow(k,2);
    let y = cy + bend - 20;
    if(x===80) sctx.moveTo(x,y);
    else sctx.lineTo(x,y);
  }

  sctx.strokeStyle = photonColor(t);
  sctx.lineWidth=3;
  sctx.stroke();

  // сам фотон
  sctx.beginPath();
  sctx.arc(px,py,6,0,Math.PI*2);
  sctx.fillStyle = photonColor(t);
  sctx.fill();
}

// график
function drawGraph(){
  const w = graph.width;
  const h = graph.height;

  gctx.clearRect(0,0,w,h);

  gctx.beginPath();

  for(let i=0;i<=100;i++){
    let x = i/100;
    let z = Math.pow(1-x,2);

    let px = 50 + x*(w-100);
    let py = h-40 - z*(h-80);

    if(i===0) gctx.moveTo(px,py);
    else gctx.lineTo(px,py);
  }

  gctx.strokeStyle="violet";
  gctx.lineWidth=3;
  gctx.stroke();

  // точка
  let z = Math.pow(1-t,2);
  let px = 50 + t*(w-100);
  let py = h-40 - z*(h-80);

  gctx.beginPath();
  gctx.arc(px,py,6,0,Math.PI*2);
  gctx.fillStyle="white";
  gctx.fill();
}

// анимация
function animate(){
  t = lerp(t, slider.value/100, 0.08);

  drawSim();
  drawGraph();

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
