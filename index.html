<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phoenix A 3D</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:-apple-system;
}

#ui{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:400px;

  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.1);
  border-radius:15px;
  padding:15px;
  color:white;
}
input{ width:100%; }
</style>
</head>

<body>

<div id="ui">
Положение фотона
<input id="slider" type="range" min="0" max="100" value="80">
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer({antialias:true});

renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// свет
const light = new THREE.PointLight(0xffffff,2);
light.position.set(5,5,5);
scene.add(light);

// черная дыра
const holeGeo = new THREE.SphereGeometry(1.2,64,64);
const holeMat = new THREE.MeshBasicMaterial({color:0x000000});
const hole = new THREE.Mesh(holeGeo,holeMat);
scene.add(hole);

// диск
const ringGeo = new THREE.TorusGeometry(2,0.4,16,100);
const ringMat = new THREE.MeshBasicMaterial({color:0xff8800});
const ring = new THREE.Mesh(ringGeo,ringMat);
ring.rotation.x = Math.PI/2;
scene.add(ring);

// фотон
const photonGeo = new THREE.SphereGeometry(0.2,32,32);
const photonMat = new THREE.MeshBasicMaterial({color:0xffffaa});
const photon = new THREE.Mesh(photonGeo,photonMat);
scene.add(photon);

camera.position.z = 6;

const slider = document.getElementById("slider");

function animate(){
  requestAnimationFrame(animate);

  let t = slider.value/100;

  // вращение
  ring.rotation.z += 0.01;

  // движение фотона
  photon.position.x = -4 + t*3;
  photon.position.y = Math.sin(t*3)*0.5;

  // красное смещение
  let r = 1;
  let g = 1 - (1-t)*0.7;
  let b = 0.7 - (1-t)*0.5;
  photon.material.color.setRGB(r,g,b);

  // камера плавно приближается
  camera.position.z = 6 - (1-t)*2;

  renderer.render(scene,camera);
}

animate();

// resize
window.addEventListener("resize",()=>{
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
